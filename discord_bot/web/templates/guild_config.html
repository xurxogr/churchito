{% extends "base.html" %}

{% block title %}{{ guild.name }} - Configuración{% endblock %}

{% block content %}
<div class="guild-config">
    <div class="page-header">
        <a href="{{ root_path }}/dashboard" class="btn btn-secondary">← Volver</a>
        <h1>
            {% if guild.icon %}
            <img src="https://cdn.discordapp.com/icons/{{ guild.id }}/{{ guild.icon }}.png" alt="" class="guild-header-icon">
            {% endif %}
            {{ guild.name }}
        </h1>
    </div>

    <div class="config-tabs">
        <nav class="cog-tabs">
            {% for cog in cogs %}
            <button
                class="cog-tab"
                hx-get="{{ root_path }}/guild/{{ guild_id }}/cog/{{ cog.name }}"
                hx-target="#cog-settings"
                hx-swap="innerHTML"
                onclick="setActiveTab(this)"
            >
                <span class="cog-icon">{{ cog.icon }}</span>
                <span class="cog-name">{{ cog.display_name }}</span>
                {% if cog.toggleable %}
                <span class="cog-status {% if cog.enabled %}status-enabled{% else %}status-disabled{% endif %}">
                    {% if cog.enabled %}✓{% else %}✗{% endif %}
                </span>
                {% endif %}
            </button>
            {% endfor %}
        </nav>

        <section class="cog-content" id="cog-settings">
            <div class="empty-state">
                <p>Selecciona una categoria de arriba para ver y editar su configuracion.</p>
            </div>
        </section>
    </div>
</div>

<script>
function setActiveTab(el) {
    document.querySelectorAll('.cog-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
}
</script>
{% endblock %}
