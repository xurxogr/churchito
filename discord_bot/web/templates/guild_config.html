{% extends "base.html" %}

{% block title %}{{ guild.name }} - Configuración{% endblock %}

{% block content %}
<div class="guild-config">
    <div class="page-header">
        <a href="{{ root_path }}/dashboard" class="btn btn-secondary" onclick="return handleBackClick(event)">← Volver</a>
        <h1>
            {% if guild.icon %}
            <img src="https://cdn.discordapp.com/icons/{{ guild.id }}/{{ guild.icon }}.png" alt="" class="guild-header-icon">
            {% endif %}
            {{ guild.name }}
        </h1>
    </div>

    <div class="config-tabs">
        <nav class="cog-tabs">
            {% for cog in cogs %}
            <button
                id="cog-tab-{{ cog.name }}"
                class="cog-tab"
                data-cog-url="{{ root_path }}/guild/{{ guild_id }}/cog/{{ cog.name }}"
                onclick="return handleCogTabClick(this, event)"
            >
                <span class="cog-icon">{{ cog.icon }}</span>
                <span class="cog-name">{{ cog.display_name }}</span>
                {% if cog.toggleable %}
                <span class="cog-status {% if cog.enabled %}status-enabled{% else %}status-disabled{% endif %}">
                    {% if cog.enabled %}✓{% else %}✗{% endif %}
                </span>
                {% endif %}
            </button>
            {% endfor %}
        </nav>

        <section class="cog-content" id="cog-settings">
            <div class="empty-state">
                <p>Selecciona una categoria de arriba para ver y editar su configuracion.</p>
            </div>
        </section>
    </div>
</div>

<script>
function setActiveTab(el) {
    document.querySelectorAll('.cog-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
}

function hasPendingChanges() {
    return window.changedOptions && window.changedOptions.size > 0;
}

function shakeSaveBar() {
    const saveBar = document.getElementById('save-bar');
    if (saveBar) {
        saveBar.classList.remove('shake');
        // Trigger reflow to restart animation
        void saveBar.offsetWidth;
        saveBar.classList.add('shake');
        setTimeout(() => saveBar.classList.remove('shake'), 400);
    }
}

function handleCogTabClick(el, event) {
    event.preventDefault();
    event.stopPropagation();

    if (hasPendingChanges()) {
        shakeSaveBar();
        return false;
    }

    // No pending changes, proceed with tab switch
    setActiveTab(el);

    // Manually trigger HTMX request
    const url = el.getAttribute('data-cog-url');
    if (url) {
        htmx.ajax('GET', url, '#cog-settings');
    }
    return false;
}

function handleBackClick(event) {
    if (hasPendingChanges()) {
        event.preventDefault();
        shakeSaveBar();
        return false;
    }
    return true;
}

// Warn before leaving page with unsaved changes
window.addEventListener('beforeunload', function(e) {
    if (hasPendingChanges()) {
        e.preventDefault();
        e.returnValue = '';
        return '';
    }
});
</script>
{% endblock %}
