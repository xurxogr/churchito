<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>{% block title %}Dashboard{% endblock %} - Bot Discord</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="stylesheet" href="{{ root_path }}/static/css/style.css">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="{{ root_path }}/dashboard">🤖 Bot Dashboard</a>
        </div>
        {% if user %}
        <div class="nav-user">
            <span class="username">{{ user.username }}</span>
            <a href="{{ root_path }}/auth/logout" class="btn btn-secondary">Cerrar sesión</a>
        </div>
        {% endif %}
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>Bot Dashboard &copy; 2024</p>
    </footer>

    <script>
        // Configurar HTMX para enviar token CSRF con cada request
        document.addEventListener('htmx:configRequest', function(event) {
            const csrfToken = document.querySelector('meta[name="csrf-token"]').content;
            event.detail.headers['X-CSRF-Token'] = csrfToken;
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
