{% extends "base.html" %}

{% block title %}Error {{ status_code }}{% endblock %}

{% block content %}
<div class="error-page">

        <h1>Error {{ status_code }}</h1>
        <p class="error-message">{{ detail }}</p>

    </div>
</div>
{% endblock %}
