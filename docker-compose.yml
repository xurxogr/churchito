services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: ${PYTHON_VERSION:-3.13}
        # Git info args - set these before building or use docker-build.sh
        GIT_COMMIT_HASH: ${GIT_COMMIT_HASH:-unknown}
        GIT_COMMIT_SHORT_HASH: ${GIT_COMMIT_SHORT_HASH:-unknown}
        GIT_COMMIT_DATE: ${GIT_COMMIT_DATE:-unknown}
        GIT_DIRTY: ${GIT_DIRTY:-unknown}
    image: discord-bot:latest
    container_name: discord-bot
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./config.json:/home/botuser/.config/discord-bot/config.json:ro
      - bot_data:/app/data
      - bot_logs:/app/logs
    ports:
      - "127.0.0.1:${WEB_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  db:
    image: postgres:17-alpine
    container_name: discord-bot-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: discord
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: discord
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U discord -d discord"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  bot_data:
  bot_logs:
  postgres_data:
